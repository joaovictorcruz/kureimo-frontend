name: CI/CD Frontend Production

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  ci:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.kureimo.com/api
          VITE_SIGNALR_URL: https://api.kureimo.com/hubs/set
          VITE_LOGTO_ENDPOINT: https://auth.kureimo.com
          VITE_LOGTO_APP_ID: ${{ secrets.VITE_LOGTO_APP_ID }}
          VITE_LOGTO_RESOURCE: https://kureimo-api.com
