server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolver DNS do Railway para resolver o hostname do backend
    resolver 8.8.8.8 valid=30s;

    # Proxy para a API
    location /api/ {
        set $backend "https://hmlkureimoapi-production.up.railway.app";
        proxy_pass $backend/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host hmlkureimoapi-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Proxy para o SignalR com WebSocket
    location /hubs/ {
        set $backend "https://hmlkureimoapi-production.up.railway.app";
        proxy_pass $backend/hubs/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host hmlkureimoapi-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}